<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/clearix-icon.svg">
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

		<!-- Meta tags -->
		<meta name="description" content="Clearix Lens - Sistema de Inteligência para Óticas">
		<meta name="theme-color" content="#14B8A6">

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:title" content="Clearix Lens">
		<meta property="og:description" content="Sistema de inteligência para sourcing de lentes oftálmicas">
		<meta property="og:image" content="/clearix-icon.svg">

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image">
		<meta name="twitter:title" content="Clearix Lens">
		<meta name="twitter:description" content="Sistema de inteligência para sourcing de lentes oftálmicas">
		<meta name="twitter:image" content="/clearix-icon.svg">
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
